# ── Nginx vhost config untuk CraftWeb ──────────────────────────
# Tambahkan ke /etc/nginx/sites-available/craftweb
# lalu symlink ke sites-enabled

server {
    listen 80;
    server_name craftweb.syramesh.my.id;   # ganti sesuai domain lo

    root /var/www/craftweb;                # path folder game
    index index.html;

    # Enable gzip (penting buat textures.js yang lumayan gede)
    gzip on;
    gzip_types text/javascript application/javascript text/css;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|png|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
